[pytest]
# make the repo root importable so tests can `import app...` regardless of
# how pytest is invoked (bare `pytest` vs `python -m pytest`, local vs CI)
pythonpath = .
testpaths = tests
asyncio_mode = auto
# test_agent.py is a manual HTTP integration script that needs a live server;
# exclude it from the default (service-free) unit-test run.
addopts = --ignore=tests/test_agent.py
